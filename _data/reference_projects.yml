public:
  - label: KlangkunstManufaktur e.V.
    link: "https://www.klangkunstmanufaktur.de"
    description: >
      Entwicklung einer wartbaren Vereinswebseite mit Fokus auf Konzertwerbung und 
      Mitgliedergewinnung
    stack: |
      - Umsetzung mit Jekyll und modernen Webtechnologien
      - Strukturierung von Inhalten für einfache Pflege
      - Optimierung für Übersichtlichkeit und Nutzerführung
  - label: Bike Blog FW
    link: "https://frankwuensch.github.io/bike-blog-fw/"
    description: >
      Entwicklung einer Plattform zur Bereitstellung von Fahrradtouren und Inspiration für Nutzer
    stack: |
      - Downloadfunktion für geplante Touren
      - Darstellung von Touren mit Bildern und Zusatzinformationen
      - Fokus auf einfache Nutzung und Zugänglichkeit
private:
  - label: App zur Bestimmung von Wildpilzen
    description: >
      Entwicklung einer App zur Unterstützung bei der Bestimmung von Wildpilzen
    stack: |
      - Strukturierte Darstellung relevanter Erkennungsmerkmale
      - Ergänzung durch Informationen zu Essbarkeit und Verwechslungspartnern
      - Geplante Erweiterung um eine automatische Bilderkennung
  - label: App zur Erstellung einer Einkaufsliste
    description: >
      Entwicklung einer mobilen App zur strukturierten Einkaufsplanung
    stack: |
      - Umsetzung mit Kotlin und SQLite
      - Eigene Nutzung im Alltag zur Optimierung von Einkaufsprozessen
      - Geplante Erweiterung um Preisanalyse und Angebotsauswertung
  - label: Programm zum Auffinden und Entfernen von Dateiduplikaten
    description: >
      Entwicklung eines Tools zur Identifikation und Verwaltung von Dateiduplikaten
    stack: |
      - Analyse von Dateien zur Erkennung redundanter Daten
      - Benutzerkontrolle vor dem Löschen zur Datensicherheit
      - Fokus auf effiziente Nutzung von Speicherressourcen
